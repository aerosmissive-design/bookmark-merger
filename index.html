<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북마크 합집합 생성기</title>
<style>
  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e23;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0efea;
    --text2: #9b9991;
    --text3: #6a6963;
    --accent: #7f77dd;
    --accent2: #534ab7;
    --teal: #1d9e75;
    --teal2: #0f6e56;
    --coral: #d85a30;
    --green: #639922;
    --amber: #ba7517;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
    line-height: 1.6;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header {
    margin-bottom: 2.5rem;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .badge {
    display: inline-block;
    background: rgba(127,119,221,0.15);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    border: 0.5px solid rgba(127,119,221,0.3);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    color: var(--text2);
    font-size: 14px;
  }

  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 560px) {
    .upload-grid { grid-template-columns: 1fr; }
  }

  .upload-zone {
    background: var(--bg2);
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(127,119,221,0.06);
  }

  .upload-zone.loaded {
    border-style: solid;
    border-color: var(--teal);
    background: rgba(29,158,117,0.06);
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  .upload-zone.loaded .upload-icon { opacity: 1; }

  .upload-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--text3);
  }

  .upload-zone.loaded .upload-label { color: var(--teal); }

  .file-info {
    font-size: 12px;
    color: var(--text2);
    margin-top: 6px;
    font-weight: 500;
  }

  .options-panel {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 16px;
  }

  .options-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  .option-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 14px;
  }

  .option-row:last-child { border-bottom: none; padding-bottom: 0; }
  .option-row:first-of-type { padding-top: 0; }

  .option-row input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .option-row label {
    cursor: pointer;
    color: var(--text);
    flex: 1;
  }

  .option-row .desc {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .merge-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: -0.01em;
    margin-bottom: 1.5rem;
  }

  .merge-btn:hover { background: var(--accent2); }
  .merge-btn:active { transform: scale(0.99); }
  .merge-btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; transform: none; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 560px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

  .stat-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.9rem 1rem;
    text-align: center;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-card.c-a .stat-num { color: var(--accent); }
  .stat-card.c-b .stat-num { color: var(--teal); }
  .stat-card.c-dup .stat-num { color: var(--amber); }
  .stat-card.c-total .stat-num { color: var(--text); }

  .result-panel {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg3);
  }

  .result-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
  }

  .folder-tree {
    padding: 0.75rem 1rem;
    max-height: 380px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .folder-item {
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 13px;
    cursor: default;
    transition: background 0.15s;
  }

  .folder-item:hover { background: rgba(255,255,255,0.04); }

  .folder-icon { color: var(--amber); margin-right: 6px; }
  .link-icon { color: var(--text3); margin-right: 6px; }

  .folder-name { font-weight: 600; color: var(--text); }
  .link-name { color: var(--text2); }
  .dup-badge {
    display: inline-block;
    background: rgba(186,117,23,0.15);
    color: var(--amber);
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .download-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 20px;
    background: var(--teal2);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
  }

  .download-btn:hover { background: var(--teal); }

  .error-msg {
    background: rgba(216,90,48,0.1);
    border: 0.5px solid rgba(216,90,48,0.3);
    color: #f09575;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .hidden { display: none !important; }

  .progress-bar {
    height: 2px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  .search-box {
    padding: 8px 12px;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    width: 200px;
  }

  .search-box:focus { outline: none; border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Chrome Bookmarks</div>
    <h1>북마크 합집합 생성기</h1>
    <p class="subtitle">두 개의 Chrome 북마크 HTML 파일을 합쳐 중복 없는 하나의 파일로 만듭니다</p>
  </header>

  <div class="upload-grid">
    <div class="upload-zone" id="zone-a" ondragover="onDrag(event,'a')" ondragleave="offDrag('a')" ondrop="onDrop(event,'a')">
      <input type="file" accept=".html,.htm" onchange="loadFile(event,'a')">
      <div class="upload-icon" id="icon-a">📂</div>
      <div class="upload-label" id="label-a">북마크 파일 A</div>
      <div class="upload-hint">클릭하거나 파일을 드래그하세요</div>
      <div class="file-info" id="info-a"></div>
    </div>
    <div class="upload-zone" id="zone-b" ondragover="onDrag(event,'b')" ondragleave="offDrag('b')" ondrop="onDrop(event,'b')">
      <input type="file" accept=".html,.htm" onchange="loadFile(event,'b')">
      <div class="upload-icon" id="icon-b">📂</div>
      <div class="upload-label" id="label-b">북마크 파일 B</div>
      <div class="upload-hint">클릭하거나 파일을 드래그하세요</div>
      <div class="file-info" id="info-b"></div>
    </div>
  </div>

  <div class="options-panel">
    <div class="options-title">병합 옵션</div>
    <div class="option-row">
      <input type="checkbox" id="opt-url" checked>
      <div>
        <label for="opt-url">URL 기준으로 중복 제거</label>
        <div class="desc">동일한 URL의 북마크를 하나만 유지합니다 (권장)</div>
      </div>
    </div>
    <div class="option-row">
      <input type="checkbox" id="opt-title">
      <div>
        <label for="opt-title">제목 기준으로도 중복 제거</label>
        <div class="desc">URL이 달라도 제목이 완전히 같으면 제거합니다</div>
      </div>
    </div>
    <div class="option-row">
      <input type="checkbox" id="opt-favor-a">
      <div>
        <label for="opt-favor-a">중복 시 파일 A 우선</label>
        <div class="desc">체크 해제 시 파일 B의 북마크를 유지합니다</div>
      </div>
    </div>
    <div class="option-row">
      <input type="checkbox" id="opt-keep-folders" checked>
      <div>
        <label for="opt-keep-folders">폴더 구조 유지</label>
        <div class="desc">체크 해제 시 모든 북마크를 단일 목록으로 병합합니다</div>
      </div>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <button class="merge-btn" id="merge-btn" onclick="merge()" disabled>
    ⚡ 합집합 생성하기
  </button>

  <div class="progress-bar hidden" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div id="result-section" class="hidden">
    <div class="stats-grid">
      <div class="stat-card c-a">
        <div class="stat-num" id="stat-a">0</div>
        <div class="stat-label">파일 A</div>
      </div>
      <div class="stat-card c-b">
        <div class="stat-num" id="stat-b">0</div>
        <div class="stat-label">파일 B</div>
      </div>
      <div class="stat-card c-dup">
        <div class="stat-num" id="stat-dup">0</div>
        <div class="stat-label">중복 제거</div>
      </div>
      <div class="stat-card c-total">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">최종 북마크</div>
      </div>
    </div>

    <div class="result-panel">
      <div class="result-header">
        <span class="result-title">미리보기</span>
        <input class="search-box" type="text" placeholder="검색..." oninput="filterPreview(this.value)" id="search-input">
      </div>
      <div class="folder-tree" id="preview-tree"></div>
    </div>

    <button class="download-btn" id="download-btn" onclick="downloadResult()">
      ⬇ 합집합 북마크 다운로드
    </button>
  </div>

</div>

<script>
const state = { a: null, b: null, mergedHtml: null, previewItems: [] };

function onDrag(e, key) { e.preventDefault(); document.getElementById('zone-'+key).classList.add('drag-over'); }
function offDrag(key) { document.getElementById('zone-'+key).classList.remove('drag-over'); }

function onDrop(e, key) {
  e.preventDefault();
  offDrag(key);
  const file = e.dataTransfer.files[0];
  if (file) processFile(file, key);
}

function loadFile(e, key) {
  const file = e.target.files[0];
  if (file) processFile(file, key);
}

function processFile(file, key) {
  const reader = new FileReader();
  reader.onload = (e) => {
    state[key] = e.target.result;
    const zone = document.getElementById('zone-' + key);
    zone.classList.add('loaded');
    document.getElementById('icon-' + key).textContent = '✅';
    document.getElementById('label-' + key).textContent = file.name;
    const parser = new DOMParser();
    const doc = parser.parseFromString(e.target.result, 'text/html');
    const count = doc.querySelectorAll('a').length;
    document.getElementById('info-' + key).textContent = `${count.toLocaleString()}개 북마크`;
    checkReady();
  };
  reader.readAsText(file, 'utf-8');
}

function checkReady() {
  document.getElementById('merge-btn').disabled = !(state.a && state.b);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.style.display = 'block';
  el.textContent = msg;
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

function setProgress(pct) {
  document.getElementById('progress-fill').style.width = pct + '%';
}

function parseBookmarks(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const bookmarks = [];

  function walk(node, path) {
    const children = node.childNodes;
    let currentFolder = path;
    for (const child of children) {
      if (child.tagName === 'DT') {
        const h3 = child.querySelector(':scope > H3');
        const a = child.querySelector(':scope > A');
        const dl = child.querySelector(':scope > DL');
        if (h3) {
          const folderName = h3.textContent.trim();
          const newPath = [...path, folderName];
          if (dl) walk(dl, newPath);
        } else if (a) {
          const href = a.getAttribute('href') || '';
          const title = a.textContent.trim();
          const addDate = a.getAttribute('add_date') || '';
          const icon = a.getAttribute('icon') || '';
          bookmarks.push({ href, title, addDate, icon, path: [...path] });
        }
      } else if (child.tagName === 'DL') {
        walk(child, currentFolder);
      }
    }
  }

  const rootDL = doc.querySelector('DL');
  if (rootDL) walk(rootDL, []);
  return bookmarks;
}

function normalizeUrl(url) {
  try {
    const u = new URL(url);
    return (u.hostname + u.pathname).replace(/\/$/, '').toLowerCase();
  } catch {
    return url.toLowerCase().replace(/\/$/, '');
  }
}

function merge() {
  hideError();
  setProgress(0);
  document.getElementById('progress-bar').classList.remove('hidden');

  setTimeout(() => {
    try {
      setProgress(20);
      const bmA = parseBookmarks(state.a);
      setProgress(40);
      const bmB = parseBookmarks(state.b);
      setProgress(60);

      const byUrl = document.getElementById('opt-url').checked;
      const byTitle = document.getElementById('opt-title').checked;
      const favorA = document.getElementById('opt-favor-a').checked;
      const keepFolders = document.getElementById('opt-keep-folders').checked;

      const seenUrls = new Map();
      const seenTitles = new Set();
      let dupCount = 0;
      const merged = [];

      const allBm = favorA ? [...bmA, ...bmB] : [...bmB, ...bmA];

      for (const bm of allBm) {
        const normUrl = normalizeUrl(bm.href);
        let isDup = false;

        if (byUrl && bm.href && seenUrls.has(normUrl)) isDup = true;
        if (byTitle && seenTitles.has(bm.title.toLowerCase())) isDup = true;

        if (isDup) {
          dupCount++;
        } else {
          if (byUrl && bm.href) seenUrls.set(normUrl, true);
          if (byTitle) seenTitles.add(bm.title.toLowerCase());
          merged.push(bm);
        }
      }

      setProgress(80);

      const countA = bmA.length;
      const countB = bmB.length;
      document.getElementById('stat-a').textContent = countA.toLocaleString();
      document.getElementById('stat-b').textContent = countB.toLocaleString();
      document.getElementById('stat-dup').textContent = dupCount.toLocaleString();
      document.getElementById('stat-total').textContent = merged.length.toLocaleString();

      state.mergedHtml = buildHtml(merged, keepFolders);
      state.previewItems = merged;
      renderPreview(merged);
      setProgress(100);

      document.getElementById('result-section').classList.remove('hidden');

    } catch (err) {
      showError('오류가 발생했습니다: ' + err.message);
    }

    setTimeout(() => {
      document.getElementById('progress-bar').classList.add('hidden');
      setProgress(0);
    }, 600);
  }, 50);
}

function buildHtml(bookmarks, keepFolders) {
  const lines = [
    '<!DOCTYPE NETSCAPE-Bookmark-file-1>',
    '<!-- This is an automatically generated file.',
    '     It will be read and overwritten.',
    '     DO NOT EDIT! -->',
    '<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">',
    '<TITLE>Bookmarks</TITLE>',
    '<H1>Bookmarks</H1>',
    '<DL><p>'
  ];

  if (!keepFolders) {
    for (const bm of bookmarks) {
      const iconAttr = bm.icon ? ` ICON="${bm.icon}"` : '';
      lines.push(`    <DT><A HREF="${escapeHtml(bm.href)}" ADD_DATE="${bm.addDate}"${iconAttr}>${escapeHtml(bm.title)}</A>`);
    }
  } else {
    const tree = {};
    for (const bm of bookmarks) {
      const key = bm.path.length > 0 ? bm.path.join('\u0000') : '__root__';
      if (!tree[key]) tree[key] = { path: bm.path, items: [] };
      tree[key].items.push(bm);
    }

    const root = tree['__root__'] || { path: [], items: [] };
    for (const bm of root.items) {
      const iconAttr = bm.icon ? ` ICON="${bm.icon}"` : '';
      lines.push(`    <DT><A HREF="${escapeHtml(bm.href)}" ADD_DATE="${bm.addDate}"${iconAttr}>${escapeHtml(bm.title)}</A>`);
    }

    const folders = Object.entries(tree).filter(([k]) => k !== '__root__');
    const folderMap = {};
    for (const [key, data] of folders) {
      const parts = key.split('\u0000');
      const parentKey = parts.length > 1 ? parts.slice(0, -1).join('\u0000') : '__root__';
      if (!folderMap[parentKey]) folderMap[parentKey] = [];
      folderMap[parentKey].push({ key, name: parts[parts.length - 1], items: data.items });
    }

    function renderFolder(parentKey, indent) {
      const subs = folderMap[parentKey] || [];
      for (const folder of subs) {
        const pad = '    '.repeat(indent);
        lines.push(`${pad}<DT><H3>${escapeHtml(folder.name)}</H3>`);
        lines.push(`${pad}<DL><p>`);
        for (const bm of folder.items) {
          const iconAttr = bm.icon ? ` ICON="${bm.icon}"` : '';
          lines.push(`${pad}    <DT><A HREF="${escapeHtml(bm.href)}" ADD_DATE="${bm.addDate}"${iconAttr}>${escapeHtml(bm.title)}</A>`);
        }
        renderFolder(folder.key, indent + 1);
        lines.push(`${pad}</DL><p>`);
      }
    }

    renderFolder('__root__', 1);
  }

  lines.push('</DL><p>');
  return lines.join('\n');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPreview(items) {
  const tree = document.getElementById('preview-tree');
  const folders = {};
  for (const bm of items) {
    const key = bm.path.length > 0 ? bm.path.join(' › ') : '(루트)';
    if (!folders[key]) folders[key] = [];
    folders[key].push(bm);
  }

  const html = [];
  for (const [folder, bms] of Object.entries(folders)) {
    html.push(`<div class="folder-item"><span class="folder-icon">📁</span><span class="folder-name">${escapeHtml(folder)}</span> <span style="color:var(--text3);font-size:12px">(${bms.length})</span></div>`);
    for (const bm of bms.slice(0, 5)) {
      html.push(`<div class="folder-item" style="padding-left:24px"><span class="link-icon">🔗</span><span class="link-name">${escapeHtml(bm.title.substring(0, 60))}${bm.title.length > 60 ? '…' : ''}</span></div>`);
    }
    if (bms.length > 5) {
      html.push(`<div class="folder-item" style="padding-left:24px;color:var(--text3);font-size:12px">… ${bms.length - 5}개 더</div>`);
    }
  }
  tree.innerHTML = html.join('');
}

function filterPreview(query) {
  if (!query) { renderPreview(state.previewItems); return; }
  const q = query.toLowerCase();
  const filtered = state.previewItems.filter(b =>
    b.title.toLowerCase().includes(q) || b.href.toLowerCase().includes(q)
  );
  renderPreview(filtered);
}

function downloadResult() {
  if (!state.mergedHtml) return;
  const blob = new Blob([state.mergedHtml], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.download = `merged_bookmarks_${dateStr}.html`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
